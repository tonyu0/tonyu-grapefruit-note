env:
 browser: true
 es2021: true
extends:
 - 'plugin:vue/vue3-recommended'
 - 'eslint:recommended'
 - '@vue/typescript/recommended'
parserOptions:
 ecmaVersion: 12
plugins:
 - vue
 - '@typescript-eslint'
rules:
  vue/max-attributes-per-line: # https://github.com/prettier/eslint-plugin-prettier/issues/94
    - error
    - singleline: 5
      multiline: 1
